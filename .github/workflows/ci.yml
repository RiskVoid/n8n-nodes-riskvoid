name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: 'npm ci'

      - name: Run build
        run: 'npm run build'

      - name: Debug - List dist folder
        run: 'ls -la dist/ || echo "dist folder does not exist"; ls -la credentials/ || echo "credentials source folder does not exist"'

      - name: Run lint
        run: 'npm run lint'

      - name: Run tests
        run: 'npm test'
